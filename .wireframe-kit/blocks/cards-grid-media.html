<!-- block: cards-grid-media -->
<section class="section-{{tone}} pad-xl">
  <div class="inner">
    <h2 class="sec-h2">{{heading}}</h2>
    <div class="grid-{{columns}}" style="margin-top:40px;">
      <!-- repeat:cards -->
      <div class="card-grey card-has-media">
        <span class="img-placeholder" aria-hidden="true"></span>
        <div class="card-body">
          <div class="card-title">{{title}}</div>
          <div class="card-desc">{{body}}</div>
        </div>
      </div>
      <!-- /repeat:cards -->
    </div>
  </div>
</section>
